# pytest configuration for Somn v16.1
[pytest]
testpaths = somn/tests somn/smart_office_assistant/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    boundary: marks tests as boundary tests
    performance: marks tests as performance tests

# Output options
addopts = -v --tb=short

# Coverage options (set by CI/CD)
# Minimum coverage threshold: 65%
# Run with: pytest --cov=smart_office_assistant --cov-fail-under=65

# Asyncio mode
asyncio_mode = auto

# Timeout (if pytest-timeout installed)
# timeout = 300
