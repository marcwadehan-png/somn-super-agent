# Somn项目测试框架配置
# Version: 1.0.0
# Updated: 2026-04-23

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider
markers =
    # 测试类型
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    smoke: 冒烟测试
    
    # 功能模块
    core: 核心模块测试
    wisdom: 智慧引擎测试
    memory: 记忆系统测试
    learning: 学习系统测试
    cloning: 克隆系统测试
    claw: Claw子系统测试
    reasoning: 推理引擎测试
    dispatcher: 调度器测试
    
    # 性能
    slow: 慢速测试（>5s）
    performance: 性能测试
    
    # 特殊
    asyncio: 异步测试
    requires_llm: 需要LLM调用

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */data/*
    */outputs/*
    */migrations/*
    */mcp/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = tests/coverage_html
