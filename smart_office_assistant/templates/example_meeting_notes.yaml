# 会议纪要模板示例
# 用于生成标准化的会议纪要文档

template:
  name: "meeting_notes"
  title: "会议纪要"
  description: "标准会议纪要模板"

document:
  title: "${meeting_title}"
  meeting_date: "${meeting_date}"
  meeting_time: "${start_time} - ${end_time}"
  location: "${location}"
  
participants:
  host: "${host_name}"
  attendees:
    - "${attendee1}"
    - "${attendee2}"
    - "${attendee3}"
  absent:
    - "${absent1}"

agenda:
  - "项目进度汇报"
  - "技术方案讨论"
  - "下阶段工作安排"

discussions:
  - topic: "项目进度汇报"
    speaker: "项目经理"
    content: |
      目前项目整体进度为75%，主要功能模块已完成开发。
      剩余工作包括：界面优化、性能调优、文档完善。
    decisions:
      - "按计划推进，确保月底完成所有开发工作"
      - "每周五下午进行进度同步"

  - topic: "技术方案讨论"
    speaker: "技术负责人"
    content: |
      讨论了新的数据存储方案，对比了关系型数据库和NoSQL数据库的优缺点。
    decisions:
      - "采用混合方案：核心数据使用PostgreSQL，日志数据使用MongoDB"
      - "技术选型文档需在下周三前完成"

  - topic: "下阶段工作安排"
    speaker: "全体成员"
    content: |
      明确了下阶段的工作重点和时间节点。
    decisions:
      - "开发团队：完成功能开发和单元测试（截止月底）"
      - "测试团队：制定测试计划，准备测试环境（下周开始）"
      - "产品团队：收集用户反馈，优化产品细节（持续进行）"

action_items:
  - task: "完成技术选型文档"
    assignee: "技术负责人"
    deadline: "${deadline1}"
    priority: "高"

  - task: "准备测试环境"
    assignee: "测试工程师"
    deadline: "${deadline2}"
    priority: "中"

  - task: "更新项目文档"
    assignee: "项目经理"
    deadline: "${deadline3}"
    priority: "中"

next_meeting:
  date: "${next_meeting_date}"
  time: "${next_meeting_time}"
  topic: "项目进度评审"

notes: |
  补充说明：
  1. 请各负责人按时完成任务
  2. 如有问题请及时沟通
  3. 下次会议请提前准备汇报材料
