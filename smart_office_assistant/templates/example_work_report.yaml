# 工作报告模板示例
# 用于生成标准化的工作报告文档

template:
  name: "weekly_work_report"
  title: "工作周报"
  description: "标准工作周报模板"
  
document:
  title: "${week_range} 工作周报"
  author: "${author_name}"
  department: "${department}"
  date: "${report_date}"

sections:
  - title: "本周工作总结"
    type: "bullet_list"
    items:
      - "完成项目A的需求分析和设计文档"
      - "参与团队技术分享会，分享主题：AI在办公场景的应用"
      - "修复系统Bug 5个，优化性能问题2处"
      - "完成客户反馈的问题排查和解决方案制定"

  - title: "下周工作计划"
    type: "numbered_list"
    items:
      - "继续推进项目A的开发工作，完成核心功能模块"
      - "准备季度汇报PPT"
      - "参与产品需求评审会议"
      - "完成代码审查和文档更新"

  - title: "遇到的问题与建议"
    type: "table"
    headers: ["问题描述", "影响程度", "解决方案", "状态"]
    rows:
      - ["开发环境配置复杂", "中", "编写环境配置文档，提供一键脚本", "进行中"]
      - ["测试覆盖率不足", "高", "增加单元测试和集成测试", "计划中"]

  - title: "需要支持"
    type: "paragraph"
    content: |
      1. 希望协调设计资源，优化产品界面
      2. 需要申请测试服务器用于性能测试
      3. 建议安排技术培训，提升团队整体能力

styles:
  title_font_size: 18
  heading_font_size: 14
  body_font_size: 11
  font_name: "Microsoft YaHei"
  
export_formats:
  - docx
  - pdf
  - markdown
