# 项目计划模板示例
# 用于生成标准化的项目计划文档

template:
  name: "project_plan"
  title: "项目计划书"
  description: "标准项目计划模板"

document:
  title: "${project_name} 项目计划书"
  version: "1.0"
  author: "${author}"
  date: "${date}"
  status: "草稿"

sections:
  - title: "项目概述"
    subsections:
      - title: "项目背景"
        content: |
          随着业务的快速发展，现有的办公系统已无法满足日益增长的需求。
          本项目旨在构建一个智能化的办公助手系统，提升工作效率，
          降低运营成本，为用户提供更好的使用体验。
      
      - title: "项目目标"
        content: |
          1. 构建智能办公助手，支持自然语言交互
          2. 集成文档生成、文件管理、知识库等功能
          3. 实现持续学习能力，不断优化用户体验
          4. 支持跨平台部署，覆盖Windows、macOS、Linux
      
      - title: "项目范围"
        content: |
          包含范围：
          - 智能对话系统开发
          - 文档生成模块（Word、PPT、PDF、Excel）
          - 文件扫描与管理功能
          - 知识库构建与管理
          - 记忆系统实现
          
          不包含范围：
          - 移动端应用开发
          - 云端服务部署
          - 第三方系统集成

  - title: "项目组织"
    subsections:
      - title: "项目团队"
        type: "table"
        headers: ["角色", "姓名", "职责", "联系方式"]
        rows:
          - ["项目经理", "张三", "项目整体管理、进度把控", "zhangsan@example.com"]
          - ["技术负责人", "李四", "技术方案设计、代码审查", "lisi@example.com"]
          - ["前端开发", "王五", "用户界面开发", "wangwu@example.com"]
          - ["后端开发", "赵六", "服务端开发、数据库设计", "zhaoliu@example.com"]
          - ["测试工程师", "孙七", "测试用例设计、质量保障", "sunqi@example.com"]

  - title: "项目计划"
    subsections:
      - title: "里程碑"
        type: "table"
        headers: ["里程碑", "计划日期", "交付物", "负责人"]
        rows:
          - ["需求分析完成", "2024-01-15", "需求规格说明书", "项目经理"]
          - ["设计评审通过", "2024-02-01", "设计文档", "技术负责人"]
          - ["Alpha版本发布", "2024-03-15", "可运行版本", "开发团队"]
          - ["Beta版本发布", "2024-04-15", "测试版本", "开发团队"]
          - ["正式版本发布", "2024-05-01", "正式版本", "项目经理"]

      - title: "详细进度"
        type: "gantt"
        phases:
          - name: "需求分析"
            start: "2024-01-01"
            end: "2024-01-15"
            tasks:
              - "需求调研"
              - "需求文档编写"
              - "需求评审"
          
          - name: "系统设计"
            start: "2024-01-16"
            end: "2024-02-01"
            tasks:
              - "架构设计"
              - "数据库设计"
              - "接口设计"
          
          - name: "开发实现"
            start: "2024-02-02"
            end: "2024-03-31"
            tasks:
              - "核心功能开发"
              - "界面开发"
              - "集成测试"
          
          - name: "测试验收"
            start: "2024-04-01"
            end: "2024-04-30"
            tasks:
              - "系统测试"
              - "用户验收测试"
              - "Bug修复"

  - title: "风险管理"
    subsections:
      - title: "风险识别"
        type: "table"
        headers: ["风险描述", "可能性", "影响程度", "应对措施"]
        rows:
          - ["技术难点攻克困难", "中", "高", "提前进行技术预研，准备备选方案"]
          - ["人员变动", "低", "高", "建立知识库，做好文档沉淀"]
          - ["需求变更", "高", "中", "建立变更流程，评估影响范围"]
          - ["进度延迟", "中", "中", "预留缓冲时间，定期跟踪进度"]

  - title: "资源需求"
    subsections:
      - title: "人力资源"
        content: |
          - 项目经理：1人
          - 技术负责人：1人
          - 开发人员：3人
          - 测试人员：2人
          - 设计人员：1人
      
      - title: "硬件资源"
        content: |
          - 开发服务器：2台
          - 测试服务器：1台
          - 开发工作站：每人1台
      
      - title: "软件资源"
        content: |
          - 开发工具：IDE、版本控制工具
          - 项目管理工具：JIRA、Confluence
          - 设计工具：Figma、Sketch

  - title: "沟通计划"
    subsections:
      - title: "会议安排"
        type: "table"
        headers: ["会议类型", "频率", "参与人员", "目的"]
        rows:
          - ["每日站会", "每天", "开发团队", "同步进度、识别问题"]
          - ["周例会", "每周", "全体人员", "总结本周、计划下周"]
          - ["评审会议", "按需", "相关人员", "需求/设计/代码评审"]
          - ["项目汇报", "每月", "管理层", "汇报项目状态"]

appendix:
  - title: "术语表"
    content: |
      AI - 人工智能（Artificial Intelligence）
      UI - 用户界面（User Interface）
      API - 应用程序接口（Application Programming Interface）
  
  - title: "参考文档"
    content: |
      1. 需求规格说明书
      2. 技术架构设计文档
      3. 用户界面设计稿
