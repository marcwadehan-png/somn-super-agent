# CI/CD Pipeline for Somn Project
# This workflow runs on every push and pull request

name: Somn CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.13'

jobs:
  # ============================================================
  # Stage 1: Lint & Code Quality
  # ============================================================
  lint:
    name: Lint & Code Quality
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install flake8 pylint pydocstyle mypy

      - name: Run flake8
        run: flake8 smart_office_assistant/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Run pylint
        run: pylint smart_office_assistant/ --max-line-length=100 --disable=C0114,C0115,C0116 || true

      - name: Run pydocstyle
        run: pydocstyle smart_office_assistant/src/ || true

  # ============================================================
  # Stage 2: Type Checking
  # ============================================================
  type-check:
    name: Type Checking
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy smart_office_assistant/src/ --ignore-missing-imports --warn-unused-configs

  # ============================================================
  # Stage 3: Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: windows-latest
    strategy:
      matrix:
        test-group:
          - core
          - intelligence
          - memory
          - claws

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short -k "${{ matrix.test-group }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-group }}
          path: tests/.pytest_cache/

  # ============================================================
  # Stage 4: Coverage Check
  # ============================================================
  coverage:
    name: Coverage Check
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Run coverage
        run: pytest tests/ --cov=smart_office_assistant --cov-report=xml --cov-fail-under=45

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

  # ============================================================
  # Stage 5: Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit
        run: bandit -r smart_office_assistant/src/ -f json -o bandit-report.json || true

      - name: Run safety
        run: safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ============================================================
  # Stage 6: Integration Tests (Daily)
  # ============================================================
  integration:
    name: Integration Tests
    runs-on: windows-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run integration tests
        run: pytest tests/test_integration_apis.py -v

      - name: Run boundary tests
        run: pytest tests/test_boundary_cases.py -v

  # ============================================================
  # Stage 7: Performance Tests (Weekly)
  # ============================================================
  performance:
    name: Performance Tests
    runs-on: windows-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pytest pytest-benchmark

      - name: Run performance tests
        run: pytest tests/test_performance.py -v --benchmark-only

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/

# ============================================================
# Scheduled Runs
# ============================================================
schedules:
  # Daily integration tests at 2 AM UTC
  - cron: '0 2 * * *'
  # Weekly performance tests on Sunday at 3 AM UTC
  - cron: '0 3 * * 0'