[pytest]
testpaths = ..
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --durations=10
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
    ignore::RuntimeWarning
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    core: marks core module tests (somn_core, agent_core)
    dispatcher: marks dispatcher tests (WisdomDispatcher, mapping)
    memory: marks memory system tests (ImperialLibrary, NeuralMemory)
    claw: marks Claw subsystem tests (ClawArchitect, GlobalClawScheduler)
    learning: marks learning system tests
