version: 2

updates:
  # ============================================================
  # Python 依赖更新
  # ============================================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "bot"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "pip"
    directory: "somn"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "bot"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "pip"
    directory: "Somn-GUI"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "gui"

  # ============================================================
  # GitHub Actions 更新
  # ============================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
      - "bot"
    commit-message:
      prefix: "ci"
