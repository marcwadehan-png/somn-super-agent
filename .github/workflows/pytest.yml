# Somn CI Pipeline - Simplified for Open Source
# Runs basic checks on every push

name: Somn CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Lint - Code quality checks
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install tools
        run: pip install flake8 pylint

      - name: Run flake8
        run: flake8 smart_office_assistant/ api/ --max-line-length=120 --extend-ignore=E203,W503,E501
        continue-on-error: true

      - name: Run pylint
        run: pylint smart_office_assistant/ api/ --max-line-length=120 --disable=C0114,C0115,C0116 || true

  # ============================================================
  # Type Check
  # ============================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy smart_office_assistant/ api/ --ignore-missing-imports
        continue-on-error: true
