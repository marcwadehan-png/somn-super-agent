# Somn CI Pipeline - Simplified for Open Source
# Basic quality gates on every push

name: Somn CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  # ============================================================
  # Lint & Code Quality
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: pip install flake8 pylint pydocstyle

      - name: Run flake8
        run: flake8 smart_office_assistant/ api/ --max-line-length=120 --extend-ignore=E203,W503,E501
        continue-on-error: true

      - name: Run pylint
        run: pylint smart_office_assistant/ api/ --max-line-length=120 --disable=C0114,C0115,C0116 || true

      - name: Run pydocstyle
        run: pydocstyle smart_office_assistant/ api/ || true

  # ============================================================
  # Type Checking
  # ============================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy smart_office_assistant/ api/ --ignore-missing-imports
        continue-on-error: true

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r smart_office_assistant/ api/ -ll -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
