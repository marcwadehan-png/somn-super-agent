name: 💡 Feature Request
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 功能提案

        > *「最好的想法往往来自社区。」* 请畅所欲言，我们认真对待每一个提案！

  - type: textarea
    id: problem
    attributes:
      label: 🎯 解决的问题
      description: 这个功能解决什么问题？适用于什么场景？
      placeholder: 描述问题背景和使用场景
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💬 解决方案
      description: 你理想中如何实现这个功能？
      placeholder: 描述你的想法或建议
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 替代方案
      description: 有没有其他你觉得可行的方案？
      placeholder: 描述替代方案
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意参与这个功能的开发实现
          required: false
        - label: 我可以提供测试用例或文档
          required: false

  - type: input
    id: scope
    attributes:
      label: 影响范围
      description: 这个功能会影响哪些模块？（推理引擎 / 知识系统 / GUI / API 等）
      placeholder: 例如：推理引擎、GUI
    validations:
      required: false
