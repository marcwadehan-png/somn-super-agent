name: 🐛 Bug Report
description: 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug 描述
        请清晰描述问题，越具体越好。

        **复现步骤：**
        1. Go to '...'
        2. Run '....'
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
      placeholder: 描述预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 描述实际行为
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: "操作系统 / Python 版本 / 相关依赖版本"
      placeholder: "例如: Windows 11, Python 3.11, PyQt 6.5"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误信息
      description: 粘贴相关日志或错误追踪
      placeholder: |
        ```
        [在此粘贴日志]
        ```
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有 Issue，确认不是重复问题
          required: true
        - label: 我使用的是最新版 Somn
          required: true
